<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 统一渐变背景 + 居中布局 */
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 登录卡片（和注册页样式一致） */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            padding: 40px 35px;
            animation: fadeIn 0.4s ease;
        }

        /* 统一淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标题样式统一 */
        .card-title {
            text-align: center;
            font-size: 26px;
            color: #333;
            margin-bottom: 35px;
            font-weight: 600;
            position: relative;
        }

        .card-title::after {
            content: "";
            width: 50px;
            height: 3px;
            background: #667eea;
            display: block;
            margin: 10px auto 0;
            border-radius: 3px;
        }

        /* 表单项通用样式 */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            color: #555;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            height: 46px;
            padding: 0 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        /* 输入框聚焦高亮 */
        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        /* 角色选择 + 记住我 通用布局 */
        .option-group {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 5px 0;
            margin-bottom: 20px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 15px;
            color: #555;
        }

        .option-item input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 登录按钮（和注册按钮样式统一） */
        .login-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* 注册跳转链接 */
        .register-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="card-title">用户登录</h2>
        <form id="loginForm">
            <!-- 用户名 -->
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="username" placeholder="请输入您的用户名" required>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>

            <!-- 登录角色选择 -->
            <div class="form-group">
                <label class="form-label">登录角色</label>
                <div class="option-group">
                    <label class="option-item">
                        <input type="radio" name="role" id="roleStudent" value="STUDENT" checked>
                        学生
                    </label>
                    <label class="option-item">
                        <input type="radio" name="role" id="roleAdmin" value="ADMIN">
                        管理员
                    </label>
                </div>
            </div>

            <!-- 记住我 -->
            <div class="option-group">
                <label class="option-item">
                    <input type="checkbox" id="rememberMe">
                    记住账号密码
                </label>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="login-btn">立即登录</button>
        </form>

        <!-- 注册跳转 -->
        <div class="register-link">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script>
        // 页面加载：自动填充记住的账号+密码+角色
        window.onload = function () {
            const savedUsername = localStorage.getItem('username');
            const savedPassword = localStorage.getItem('password');
            const savedRole = localStorage.getItem('role');
            
            if (savedUsername && savedPassword) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('password').value = savedPassword;
                document.getElementById('rememberMe').checked = true;
                if (savedRole) {
                    document.getElementById('role' + savedRole).checked = true;
                }
            }
        };

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            const role = document.querySelector('input[name="role"]:checked').value;

            // 本地存储逻辑
            if (rememberMe) {
                localStorage.setItem('username', username);
                localStorage.setItem('password', password);
                localStorage.setItem('role', role);
            } else {
                localStorage.removeItem('username');
                localStorage.removeItem('password');
                localStorage.removeItem('role');
            }

            // 发送登录请求
            fetch('/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: username, 
                    password: password,
                    rememberMe: rememberMe,
                    role: role
                })
            })
            .then(res => res.json())
            .then(result => {
                if (result.code === 200) {
                    alert('登录成功！');
                    window.location.href = '/index.html';
                } else {
                    alert('登录失败：' + result.msg);
                }
            })
            .catch(err => {
                alert('网络异常，请检查后端是否启动！');
            });
        });
    </script>
</body>
</html>
