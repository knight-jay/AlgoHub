<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面背景 + 居中布局 */
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 注册卡片容器 */
        .register-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            padding: 40px 35px;
            animation: fadeIn 0.4s ease;
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标题样式 */
        .card-title {
            text-align: center;
            font-size: 26px;
            color: #333;
            margin-bottom: 35px;
            font-weight: 600;
            position: relative;
        }

        .card-title::after {
            content: "";
            width: 50px;
            height: 3px;
            background: #667eea;
            display: block;
            margin: 10px auto 0;
            border-radius: 3px;
        }

        /* 表单项通用样式 */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            color: #555;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            height: 46px;
            padding: 0 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        /* 输入框聚焦效果 */
        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        /* 角色选择区域 */
        .role-group {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 5px 0;
        }

        .role-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 15px;
            color: #555;
        }

        .role-item input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 注册按钮 */
        .register-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .register-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        /* 登录跳转链接 */
        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h2 class="card-title">用户注册</h2>
        <form id="registerForm">
            <!-- 用户名 -->
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" name="username" placeholder="请输入3-20位用户名" required>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" name="password" placeholder="请输入6-20位密码" required>
            </div>

            <!-- 确认密码 -->
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" name="confirmPassword" placeholder="请再次输入密码" required>
            </div>

            <!-- 手机号 -->
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="text" class="form-input" name="phone" placeholder="请输入手机号" required>
            </div>

            <!-- 角色选择 -->
            <div class="form-group">
                <label class="form-label">注册角色</label>
                <div class="role-group">
                    <label class="role-item">
                        <input type="radio" name="role" value="STUDENT" checked>
                        学生
                    </label>
                    <label class="role-item">
                        <input type="radio" name="role" value="ADMIN">
                        管理员
                    </label>
                </div>
            </div>

            <!-- 注册按钮 -->
            <button type="submit" class="register-btn">立即注册</button>
        </form>

        <!-- 跳转登录 -->
        <div class="login-link">
            已有账号？<a href="login.html">去登录</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            fetch('/api/user/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(result => {
                if (result.code === 200) {
                    alert('注册成功！即将跳转到登录页');
                    window.location.href = '/login.html';
                } else {
                    alert(result.msg);
                }
            })
            .catch(() => {
                alert('网络错误，请稍后重试');
            });
        });
    </script>
</body>
</html>
